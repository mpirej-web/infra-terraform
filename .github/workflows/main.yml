name: Terraform Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup Terraform
        run: |
          echo "Setting up Terraform"
          terraform init
      - name: Build Terraform
        run: |
          echo "Building Terraform"
          terraform validate